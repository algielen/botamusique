<!DOCTYPE html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta charset="UTF-8">

    <title>Interfaccia Web di botamusique</title>

    <link rel="icon" href="static/image/favicon.ico" />

    <link rel="stylesheet" href="static/css/main.css">
</head>

<body>
    <div class="container" style="max-width: 800px">
        <div class="col-8" style="margin: auto; padding-top: 50px;">
            <div class="card">
                <div class="card-header">
                    Token richiesto
                </div>
                <div class="card-body">
                    <h3>Token richiesto</h3>
                    Stai accedendo all'interfaccia web di {{ name }}.
È necessario un token per concederti l'accesso.<br />
Per favore invia \"{{ command }}\" al bot in mumble per acquisirne uno.
                    <form action="." method="get">
                        <div class="form-group mt-3">
                            <label for="token_input">Token</label>
                            <div class="input-group">
                                <input type="password" class="form-control me-2" id="token_input" name="token" placeholder="xxxxxxx">
                                <button type="submit" class="btn btn-primary">Invia</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
