<!DOCTYPE html>

<html lang="en" data-bs-theme="light">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta charset="UTF-8">

    <title>botamusiqueウェブインタフェイス</title>

    <link rel="icon" href="static/image/favicon.ico" />

    <!-- Apply the saved theme before the stylesheet loads to avoid a flash of
         the wrong theme (FOUC). Mirrors lib/theme.mjs: the dark (darkly) theme
         keeps no data-bs-theme attribute; the light (flatly) theme carries
         data-bs-theme="light" as the hook for custom.css overrides. -->
    <script>
        (function () {
            var dark = localStorage.getItem('darkTheme') === 'true';
            if (dark) {
                document.documentElement.removeAttribute('data-bs-theme');
            }
            var link = document.createElement('link');
            link.id = 'pagestyle';
            link.rel = 'stylesheet';
            link.href = 'static/css/' + (dark ? 'dark' : 'main') + '.css';
            document.head.appendChild(link);
        })();
    </script>
    <noscript><link id="pagestyle" rel="stylesheet" href="static/css/main.css"></noscript>
    <link rel="stylesheet" href="static/css/custom.css">
</head>

<body>
    <div class="container" style="max-width: 800px">
        <div class="col-8" style="margin: auto; padding-top: 50px;">
            <div class="card">
                <div class="card-header">
                    トークンが必要です
                </div>
                <div class="card-body">
                    <h3>トークンが必要です</h3>
                    このページは{{ name }}のウェブインタフェイスです。
設定によって、ログオンするにはトークンが必要になります。<br />
 "{{ command }}" を送信してトークンを取得してください。
                    <form action="." method="get">
                        <div class="form-group mt-3">
                            <label for="token_input">トークン</label>
                            <div class="input-group">
                                <input type="password" class="form-control me-2" id="token_input" name="token" placeholder="xxxxxxx">
                                <button type="submit" class="btn btn-primary">送信</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
