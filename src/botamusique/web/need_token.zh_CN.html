<!DOCTYPE html>

<html lang="en" data-bs-theme="light">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta charset="UTF-8">

    <title>botamusique控制面板</title>

    <link rel="icon" href="static/image/favicon.ico" />

    <!-- Apply the saved theme before the stylesheet loads to avoid a flash of
         the wrong theme (FOUC). Mirrors lib/theme.mjs: the dark (darkly) theme
         keeps no data-bs-theme attribute; the light (flatly) theme carries
         data-bs-theme="light" as the hook for custom.css overrides. -->
    <script>
        (function () {
            var dark = localStorage.getItem('darkTheme') === 'true';
            if (dark) {
                document.documentElement.removeAttribute('data-bs-theme');
            }
            var link = document.createElement('link');
            link.id = 'pagestyle';
            link.rel = 'stylesheet';
            link.href = 'static/css/' + (dark ? 'dark' : 'main') + '.css';
            document.head.appendChild(link);
        })();
    </script>
    <noscript><link id="pagestyle" rel="stylesheet" href="static/css/main.css"></noscript>
    <link rel="stylesheet" href="static/css/custom.css">
</head>

<body>
    <div class="container" style="max-width: 800px">
        <div class="col-8" style="margin: auto; padding-top: 50px;">
            <div class="card">
                <div class="card-header">
                    需要登录令牌
                </div>
                <div class="card-body">
                    <h3>需要登录令牌</h3>
                    你现在在访问{{ name }}的网络控制面板。
根据设置，你需要一个令牌才能登录。<br />
请发送 "{{ command }}" 以获取你的登录令牌。
                    <form action="." method="get">
                        <div class="form-group mt-3">
                            <label for="token_input">令牌</label>
                            <div class="input-group">
                                <input type="password" class="form-control me-2" id="token_input" name="token" placeholder="xxxxxxx">
                                <button type="submit" class="btn btn-primary">提交</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
