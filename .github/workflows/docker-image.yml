name: Docker Image CI
# source : https://docs.docker.com/guides/gha/

on:
  push:
    branches: [ "master" ]
#  schedule:
#    - cron: '0 2 * * 0' # Runs every Sunday at 2:00 AM UTC
  release:
    types: [published]
  

jobs:

  test:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install dependencies
      run: uv sync --dev

    - name: Run tests
      run: uv run pytest tests/ -v

  build:

    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact: linux-arm64
    runs-on: ${{ matrix.runner }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: ${{ matrix.platform }}
        file: ./Dockerfile
        outputs: type=image,name=${{ vars.DOCKER_USERNAME }}/botamusique,push-by-digest=true,name-canonical=true,push=true
        build-args: GIT_COMMIT=${{ github.sha }}
        provenance: true
        sbom: true

    - name: Export digest
      run: |
        mkdir -p /tmp/digests
        digest="${{ steps.build.outputs.digest }}"
        touch "/tmp/digests/${digest#sha256:}"

    - name: Upload digest
      uses: actions/upload-artifact@v7
      with:
        name: digests-${{ matrix.artifact }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1

  merge:

    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Download digests
      uses: actions/download-artifact@v7
      with:
        path: /tmp/digests
        pattern: digests-*
        merge-multiple: true

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract Docker image metadata
      id: meta
      uses: docker/metadata-action@v6
      env:
        DOCKER_METADATA_ANNOTATIONS_LEVELS: index
      with:
        images: ${{ vars.DOCKER_USERNAME }}/botamusique
        tags: |
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Create multi-platform manifest
      working-directory: /tmp/digests
      env:
        TAGS: ${{ steps.meta.outputs.tags }}
        ANNOTATIONS: ${{ steps.meta.outputs.annotations }}
      run: |
        args=()
        while IFS= read -r tag; do
          [ -n "$tag" ] && args+=(-t "$tag")
        done <<< "$TAGS"
        while IFS= read -r annotation; do
          [ -n "$annotation" ] && args+=(--annotation "$annotation")
        done <<< "$ANNOTATIONS"
        docker buildx imagetools create "${args[@]}" \
          $(printf '${{ vars.DOCKER_USERNAME }}/botamusique@sha256:%s ' *)

  publish-release:

    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Build package
      run: uv build

    - name: Upload release assets
      uses: softprops/action-gh-release@v3
      with:
        files: |
            dist/*.tar.gz
            dist/*.whl
